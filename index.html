<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richiesta Sito Web - Fabio Cavalieri</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #333;
}

p {
    text-align: center;
    color: #666;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

textarea {
    resize: vertical;
}

.price-box {
    background: #f0f4ff;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

button {
    width: 100%;
    padding: 15px;
    background: #009955;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #007744;
}

#signature-pad {
    border: 2px dashed #ccc;
    border-radius: 10px;
    width: 100%;
    height: 200px;
}

.clear-btn {
    margin-top: 10px;
    background: #ff4444;
}
</style>
</head>

<body>

<div class="container">

<h1>📩 Richiesta Realizzazione Sito Web</h1>
<p>Compila il modulo per ricevere un preventivo personalizzato.</p>

<form id="contactForm" action="https://formsubmit.co/fabio.cavalieri+1@libero.it" method="POST">

<input type="hidden" name="_subject" value="🚀 Nuovo Cliente Sito Web">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_autoresponse" value="Grazie! Ti contatterò presto. - Fabio Cavalieri">
<input type="hidden" name="_next" value="https://carosello75.github.io/preventivo/">
<input type="hidden" name="_replyto" value="email">

<div class="form-group">
<label>Data</label>
<input type="date" name="data" required>
</div>

<div class="form-group">
<label>Nome</label>
<input type="text" name="nome" required>
</div>

<div class="form-group">
<label>Cognome</label>
<input type="text" name="cognome" required>
</div>

<div class="form-group">
<label>Sesso</label>
<select name="sesso">
<option>Uomo</option>
<option>Donna</option>
</select>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Telefono</label>
<input type="tel" name="telefono" required>
</div>

<div class="form-group">
<label>Indirizzo</label>
<input type="text" name="indirizzo">
</div>

<div class="form-group">
<label>Descrizione progetto</label>
<textarea name="descrizione" rows="4"></textarea>
</div>

<div class="price-box">
<label>💻 Tipo di sito</label>
<select name="tipo_sito">
<option>Sito Base - €800</option>
<option>E-commerce - €1500</option>
<option>Piattaforma Pro - €2000</option>
</select>
</div>

<h3>✍️ Firma Digitale</h3>
<canvas id="signature-pad"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas()">Cancella Firma</button>

<input type="hidden" name="firma" id="firma">

<br><br>

<button type="submit">Invia richiesta</button>

</form>

</div>

<script>
const canvas = document.getElementById("signature-pad");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
});
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => {
    drawing = false;
    ctx.beginPath();
});
canvas.addEventListener("touchmove", drawTouch);

function draw(e) {
    if (!drawing) return;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
}

function drawTouch(e) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];

    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineTo(x, y);
    ctx.stroke();
}

// salva firma PRIMA dell'invio
document.getElementById("contactForm").addEventListener("submit", function() {
    const dataURL = canvas.toDataURL();
    document.getElementById("firma").value = dataURL;
});

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
